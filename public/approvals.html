<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Approve A Deal — Dnols</title>
    <meta
      name="description"
      content="Approve or reject a Dnols deal request. Humans stay in control before execution."
    />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Lora:wght@600;700&display=swap"
    />
    <style>
      :root {
        --bg: #05060a;
        --surface: #0d0f18;
        --border: #1c1f2e;
        --brand: #4f6ef7;
        --brand-glow: rgba(79, 110, 247, 0.18);
        --accent: #00e5c3;
        --text-1: #f0f1f5;
        --text-2: #8a8fa8;
        --danger: #ff6b7a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 50% 0%, var(--brand-glow), transparent 34rem),
          var(--bg);
        color: var(--text-1);
        font-family: "Inter", system-ui, sans-serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .container {
        width: min(760px, calc(100% - 32px));
        margin: 0 auto;
      }

      .nav {
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid var(--border);
        background: rgba(5, 6, 10, 0.78);
        backdrop-filter: blur(20px);
      }

      .nav-inner {
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .logo {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 15px;
        font-weight: 600;
      }

      .brand-logo {
        width: 24px;
        height: 24px;
        display: block;
        object-fit: contain;
        filter: invert(1);
      }

      .back-link {
        color: var(--text-2);
        font-size: 14px;
        font-weight: 500;
      }

      .hero {
        padding: 56px 0 28px;
        text-align: center;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 680px;
        margin: 14px auto 0;
        font-family: "Lora", Georgia, serif;
        font-size: clamp(34px, 6vw, 52px);
        line-height: 1.12;
        letter-spacing: -0.04em;
      }

      .hero p {
        max-width: 600px;
        margin: 18px auto 0;
        color: var(--text-2);
        font-size: 18px;
        line-height: 1.6;
      }

      .panel {
        margin: 28px auto 80px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--surface);
        padding: 24px;
      }

      form,
      .status {
        display: grid;
        gap: 16px;
      }

      .legal-links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 16px;
        color: var(--text-2);
        font-size: 13px;
      }

      label {
        display: grid;
        gap: 8px;
        color: var(--text-2);
        font-size: 14px;
        font-weight: 500;
      }

      input,
      textarea,
      select {
        width: 100%;
        min-height: 48px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #090b12;
        color: var(--text-1);
        font: inherit;
        padding: 12px;
        outline: none;
      }

      textarea {
        min-height: 112px;
        resize: vertical;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 4px var(--brand-glow);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 50px;
        border: 1px solid var(--brand);
        border-radius: 8px;
        background: var(--brand);
        color: var(--text-1);
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      .message {
        border-left: 3px solid var(--border);
        color: var(--text-2);
        line-height: 1.5;
        margin: 0;
        padding-left: 10px;
      }

      .message.ok {
        border-color: var(--accent);
        color: var(--accent);
      }

      .message.error {
        border-color: var(--danger);
        color: var(--danger);
      }

      @media (max-width: 720px) {
        .container {
          width: min(100% - 24px, 560px);
        }

        .nav-inner {
          height: 60px;
        }

        .hero {
          padding: 36px 0 16px;
          text-align: left;
        }

        h1 {
          font-size: clamp(30px, 9vw, 38px);
        }

        .hero p {
          font-size: 16px;
        }

        .panel {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <nav class="nav">
      <div class="container nav-inner">
        <a class="logo" href="/">
          <img class="brand-logo" src="/logo.png" alt="" aria-hidden="true" />
          <span>Dnols</span>
        </a>
        <a class="back-link" href="/deals.html">Request a deal</a>
      </div>
    </nav>

    <header class="hero">
      <div class="container">
        <div class="eyebrow">Human Approval</div>
        <h1>Approve or reject a deal before anything happens.</h1>
        <p>
          Dnols stores your decision so the business agent can move forward only after a human says yes.
        </p>
      </div>
    </header>

    <main class="container">
      <section class="panel">
        <form id="approvalForm">
          <label>
            Deal request ID
            <input name="dealRequestId" placeholder="Paste deal ID" required />
          </label>

          <label>
            Approval code
            <input name="approvalCode" placeholder="Code from deal request" required />
          </label>

          <label>
            Your email
            <input name="approverEmail" type="email" placeholder="owner@business.com" required />
          </label>

          <label>
            Decision
            <select name="decision" required>
              <option value="approved">Approve deal</option>
              <option value="rejected">Reject deal</option>
            </select>
          </label>

          <label>
            Reason or note
            <textarea name="reason" placeholder="Approved within current budget, or rejected because..."></textarea>
          </label>

          <button class="btn" id="submitBtn" type="submit">Save approval decision →</button>
        </form>
        <div id="status" class="status"></div>
        <div class="legal-links" aria-label="Legal links">
          <a href="/terms.html">Terms</a>
          <a href="/privacy.html">Privacy</a>
          <a href="/disclaimer.html">Disclaimer</a>
        </div>
      </section>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
      import {
        addDoc,
        collection,
        getFirestore,
        serverTimestamp
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-lite.js";

      const form = document.querySelector("#approvalForm");
      const status = document.querySelector("#status");
      const submitBtn = document.querySelector("#submitBtn");
      const firestoreReady = initFirestore().then(
        (db) => ({ db }),
        (error) => ({ error })
      );

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const input = Object.fromEntries(new FormData(form).entries());
        const validation = validateApproval(input);
        if (!validation.valid) {
          status.innerHTML = validation.errors.map((error) => `<p class="message error">${escapeHtml(error)}</p>`).join("");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Saving decision...";
        status.innerHTML = `<p class="message ok">Saving human decision...</p>`;

        try {
          const saved = await withTimeout(saveApproval(input), 15000);
          status.innerHTML = [
            `<p class="message ok">Approval decision saved.</p>`,
            `<p class="message">Decision ID: ${escapeHtml(saved.id)}</p>`,
            `<p class="message">Decision: ${escapeHtml(input.decision)}</p>`
          ].join("");
          form.reset();
        } catch (error) {
          status.innerHTML = `<p class="message error">${escapeHtml(error.message || "Could not save decision.")}</p>`;
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Save approval decision →";
        }
      });

      async function initFirestore() {
        const response = await fetch("/__/firebase/init.json");
        if (!response.ok) {
          throw new Error("Firebase project config was not found. Please open this page from Firebase Hosting.");
        }
        return getFirestore(initializeApp(await response.json()));
      }

      async function saveApproval(input) {
        const firestore = await firestoreReady;
        if (firestore.error) throw firestore.error;

        const docRef = await addDoc(collection(firestore.db, "dealApprovals"), {
          schemaVersion: 1,
          source: "deal-approval",
          dealRequestId: clean(input.dealRequestId),
          approvalCode: clean(input.approvalCode),
          decision: clean(input.decision),
          approver: {
            email: clean(input.approverEmail)
          },
          reason: clean(input.reason).slice(0, 800),
          createdAt: serverTimestamp(),
          submittedAtClient: new Date().toISOString(),
          page: window.location.href,
          userAgent: navigator.userAgent.slice(0, 240)
        });
        return { id: docRef.id };
      }

      function validateApproval(input) {
        const errors = [];
        if (clean(input.dealRequestId).length < 8) errors.push("Deal request ID is required.");
        if (clean(input.approvalCode).length < 4) errors.push("Approval code is required.");
        if (!clean(input.approverEmail)) errors.push("Approver email is required.");
        if (!["approved", "rejected"].includes(clean(input.decision))) errors.push("Decision must be approved or rejected.");
        return { valid: errors.length === 0, errors };
      }

      function withTimeout(promise, timeoutMs) {
        return Promise.race([
          promise,
          new Promise((_, reject) => {
            setTimeout(() => reject(new Error("Saving took too long. Please try again.")), timeoutMs);
          })
        ]);
      }

      function clean(value) {
        return String(value ?? "").trim();
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Request A Deal — Dnols</title>
    <meta
      name="description"
      content="Create a deal request for a business agent. Dnols stores the request for human approval before execution."
    />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Lora:wght@600;700&display=swap"
    />
    <style>
      :root {
        --bg: #05060a;
        --surface: #0d0f18;
        --border: #1c1f2e;
        --brand: #4f6ef7;
        --brand-glow: rgba(79, 110, 247, 0.18);
        --accent: #00e5c3;
        --text-1: #f0f1f5;
        --text-2: #8a8fa8;
        --text-3: #4a4f68;
        --danger: #ff6b7a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 50% 0%, var(--brand-glow), transparent 34rem),
          var(--bg);
        color: var(--text-1);
        font-family: "Inter", system-ui, sans-serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .container {
        width: min(880px, calc(100% - 32px));
        margin: 0 auto;
      }

      .nav {
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid var(--border);
        background: rgba(5, 6, 10, 0.78);
        backdrop-filter: blur(20px);
      }

      .nav-inner {
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .logo {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 15px;
        font-weight: 600;
      }

      .brand-logo {
        width: 24px;
        height: 24px;
        display: block;
        object-fit: contain;
        filter: invert(1);
      }

      .back-link {
        color: var(--text-2);
        font-size: 14px;
        font-weight: 500;
      }

      .hero {
        padding: 56px 0 28px;
        text-align: center;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1,
      h2 {
        margin: 0;
        font-family: "Lora", Georgia, serif;
      }

      h1 {
        max-width: 760px;
        margin: 14px auto 0;
        font-size: clamp(34px, 6vw, 52px);
        line-height: 1.12;
        letter-spacing: -0.04em;
      }

      .hero p {
        max-width: 620px;
        margin: 18px auto 0;
        color: var(--text-2);
        font-size: 18px;
        line-height: 1.6;
      }

      .panel {
        margin: 28px auto 80px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--surface);
        padding: 24px;
      }

      form,
      .two-col,
      .status {
        display: grid;
        gap: 16px;
      }

      .legal-links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 16px;
        color: var(--text-2);
        font-size: 13px;
      }

      .two-col {
        grid-template-columns: 1fr 1fr;
      }

      label {
        display: grid;
        gap: 8px;
        color: var(--text-2);
        font-size: 14px;
        font-weight: 500;
      }

      input,
      textarea,
      select {
        width: 100%;
        min-height: 48px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #090b12;
        color: var(--text-1);
        font: inherit;
        padding: 12px;
        outline: none;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 4px var(--brand-glow);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 50px;
        border: 1px solid var(--brand);
        border-radius: 8px;
        background: var(--brand);
        color: var(--text-1);
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      .message {
        border-left: 3px solid var(--border);
        color: var(--text-2);
        line-height: 1.5;
        margin: 0;
        padding-left: 10px;
      }

      .message.ok {
        border-color: var(--accent);
        color: var(--accent);
      }

      .message.error {
        border-color: var(--danger);
        color: var(--danger);
      }

      @media (max-width: 720px) {
        .container {
          width: min(100% - 24px, 560px);
        }

        .nav-inner {
          height: 60px;
        }

        .hero {
          padding: 36px 0 16px;
          text-align: left;
        }

        h1 {
          font-size: clamp(30px, 9vw, 38px);
        }

        .hero p {
          font-size: 16px;
        }

        .panel {
          padding: 18px;
        }

        .two-col {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <nav class="nav">
      <div class="container nav-inner">
        <a class="logo" href="/">
          <img class="brand-logo" src="/logo.png" alt="" aria-hidden="true" />
          <span>Dnols</span>
        </a>
        <a class="back-link" href="/onboarding.html">Create agent profile</a>
      </div>
    </nav>

    <header class="hero">
      <div class="container">
        <div class="eyebrow">Deal Request</div>
        <h1>Ask a business agent for a quote or service.</h1>
        <p>
          This creates a structured deal request. The business owner still approves before anything is
          executed.
        </p>
      </div>
    </header>

    <main class="container">
      <section class="panel">
        <form id="dealForm">
          <div class="two-col">
            <label>
              Your business name
              <input name="requesterName" placeholder="Acme Manufacturing" required />
            </label>
            <label>
              Your contact email
              <input name="requesterEmail" type="email" placeholder="buyer@acme.com" required />
            </label>
          </div>

          <div class="two-col">
            <label>
              Target business namespace
              <input name="targetNamespace" placeholder="com.sanelx" required />
            </label>
            <label>
              Target business name
              <input name="targetName" placeholder="Sanelx" required />
            </label>
          </div>

          <label>
            What do you need?
            <textarea
              name="requirements"
              placeholder="We need a quote for website automation and agent-ready customer intake."
              required
            ></textarea>
          </label>

          <div class="two-col">
            <label>
              Requested capability
              <input name="capabilityId" placeholder="sanelx-service" required />
            </label>
            <label>
              Deadline
              <input name="deadline" type="date" required />
            </label>
          </div>

          <div class="two-col">
            <label>
              Budget amount
              <input name="budgetAmount" type="number" min="0" step="1" placeholder="500" required />
            </label>
            <label>
              Currency
              <input name="currency" maxlength="3" placeholder="USD" required />
            </label>
          </div>

          <label>
            Approval email for this deal
            <input name="approvalEmail" type="email" placeholder="owner@target-business.com" required />
          </label>

          <button class="btn" id="submitBtn" type="submit">Create deal request →</button>
        </form>
        <div id="status" class="status"></div>
        <div class="legal-links" aria-label="Legal links">
          <a href="/terms.html">Terms</a>
          <a href="/privacy.html">Privacy</a>
          <a href="/disclaimer.html">Disclaimer</a>
        </div>
      </section>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
      import {
        addDoc,
        collection,
        getFirestore,
        serverTimestamp
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-lite.js";
      import { MANUAL_REVIEW_FIRST_DEALS, dailyDealRequestLimitStatus } from "./risk-controls.js";

      const form = document.querySelector("#dealForm");
      const status = document.querySelector("#status");
      const submitBtn = document.querySelector("#submitBtn");
      const firestoreReady = initFirestore().then(
        (db) => ({ db }),
        (error) => ({ error })
      );

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const input = Object.fromEntries(new FormData(form).entries());
        const validation = validateDeal(input);
        if (!validation.valid) {
          status.innerHTML = validation.errors.map((error) => `<p class="message error">${escapeHtml(error)}</p>`).join("");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Saving deal request...";
        status.innerHTML = `<p class="message ok">Creating deal request for human approval...</p>`;

        try {
          const approvalCode = createApprovalCode();
          const requestLimit = publicRequestLimitStatus(input.requesterEmail);
          if (!requestLimit.allowed) {
            throw new Error("Daily deal request limit reached. Please try again tomorrow or contact the business owner directly.");
          }
          const saved = await withTimeout(saveDealRequest(input, approvalCode), 15000);
          incrementPublicRequestCount(input.requesterEmail);
          status.innerHTML = [
            `<p class="message ok">Deal request saved.</p>`,
            `<p class="message">Deal ID: ${escapeHtml(saved.id)}</p>`,
            `<p class="message">Approval code: ${escapeHtml(approvalCode)}</p>`,
            `<p class="message">Send both to the business owner, or open /approvals to approve or reject.</p>`
          ].join("");
          form.reset();
        } catch (error) {
          status.innerHTML = `<p class="message error">${escapeHtml(error.message || "Could not save deal request.")}</p>`;
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Create deal request →";
        }
      });

      async function initFirestore() {
        const response = await fetch("/__/firebase/init.json");
        if (!response.ok) {
          throw new Error("Firebase project config was not found. Please open this page from Firebase Hosting.");
        }
        return getFirestore(initializeApp(await response.json()));
      }

      async function saveDealRequest(input, approvalCode) {
        const firestore = await firestoreReady;
        if (firestore.error) throw firestore.error;

        const amount = Number(clean(input.budgetAmount)) || 0;
        const currency = clean(input.currency).toUpperCase() || "USD";
        const requestLimit = publicRequestLimitStatus(input.requesterEmail);
        const dealSummary = `${clean(input.requesterName)} requests ${clean(input.capabilityId)} from ${clean(
          input.targetName
        )} with budget ${currency} ${amount} by ${clean(input.deadline)}.`;

        const docRef = await addDoc(collection(firestore.db, "dealRequests"), {
          schemaVersion: 1,
          source: "deal-request",
          status: "pending_human_approval",
          requester: {
            name: clean(input.requesterName),
            email: clean(input.requesterEmail)
          },
          target: {
            namespace: clean(input.targetNamespace),
            name: clean(input.targetName)
          },
          capability: {
            id: clean(input.capabilityId)
          },
          requirements: {
            description: clean(input.requirements).slice(0, 2000),
            deadline: clean(input.deadline)
          },
          budget: {
            amount,
            currency
          },
          riskControls: {
            dailyRequestCount: requestLimit.countToday + 1,
            dailyRequestLimit: requestLimit.limit,
            manualReviewRequired: true,
            manualReviewReason: "public_deal_request",
            firstDealsThreshold: MANUAL_REVIEW_FIRST_DEALS
          },
          dealSummary,
          approval: {
            email: clean(input.approvalEmail),
            code: approvalCode,
            required: true
          },
          createdAt: serverTimestamp(),
          submittedAtClient: new Date().toISOString(),
          page: window.location.href,
          userAgent: navigator.userAgent.slice(0, 240)
        });
        return { id: docRef.id };
      }

      function validateDeal(input) {
        const errors = [];
        if (!clean(input.requesterName)) errors.push("Your business name is required.");
        if (!clean(input.requesterEmail)) errors.push("Your contact email is required.");
        if (!clean(input.targetNamespace)) errors.push("Target namespace is required.");
        if (!clean(input.targetName)) errors.push("Target business name is required.");
        if (clean(input.requirements).length < 20) errors.push("Please describe the deal in at least 20 characters.");
        if (!clean(input.capabilityId)) errors.push("Requested capability is required.");
        if (!clean(input.deadline)) errors.push("Deadline is required.");
        if ((Number(clean(input.budgetAmount)) || 0) <= 0) errors.push("Budget amount must be greater than zero.");
        if (!clean(input.currency)) errors.push("Currency is required.");
        if (!clean(input.approvalEmail)) errors.push("Approval email is required.");
        return { valid: errors.length === 0, errors };
      }

      function createApprovalCode() {
        return Math.random().toString(36).slice(2, 8).toUpperCase();
      }

      function withTimeout(promise, timeoutMs) {
        return Promise.race([
          promise,
          new Promise((_, reject) => {
            setTimeout(() => reject(new Error("Saving took too long. Please try again.")), timeoutMs);
          })
        ]);
      }

      function clean(value) {
        return String(value ?? "").trim();
      }

      function publicRequestLimitStatus(email) {
        const count = Number(localStorage.getItem(publicRequestLimitKey(email)) || "0");
        return dailyDealRequestLimitStatus(count);
      }

      function incrementPublicRequestCount(email) {
        const key = publicRequestLimitKey(email);
        localStorage.setItem(key, String(Number(localStorage.getItem(key) || "0") + 1));
      }

      function publicRequestLimitKey(email) {
        const today = new Date().toISOString().slice(0, 10);
        return `dnols:dealRequests:${clean(email).toLowerCase()}:${today}`;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
    </script>
  </body>
</html>

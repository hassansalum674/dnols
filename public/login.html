<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Business Login — Dnols</title>
    <meta name="description" content="Sign in to your Dnols business dashboard." />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Lora:wght@600;700&display=swap"
    />
    <style>
      :root {
        --bg: #05060a;
        --surface: #0d0f18;
        --border: #1c1f2e;
        --brand: #4f6ef7;
        --brand-glow: rgba(79, 110, 247, 0.18);
        --accent: #00e5c3;
        --text-1: #f0f1f5;
        --text-2: #8a8fa8;
        --danger: #ff6b7a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 50% 0%, var(--brand-glow), transparent 34rem),
          var(--bg);
        color: var(--text-1);
        font-family: "Inter", system-ui, sans-serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .container {
        width: min(1040px, calc(100% - 32px));
        margin: 0 auto;
      }

      .nav {
        border-bottom: 1px solid var(--border);
        background: rgba(5, 6, 10, 0.78);
        backdrop-filter: blur(20px);
      }

      .nav-inner {
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .logo {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 15px;
        font-weight: 600;
      }

      .brand-logo {
        width: 24px;
        height: 24px;
        display: block;
        object-fit: contain;
        filter: invert(1);
      }

      .back-link {
        color: var(--text-2);
        font-size: 14px;
        font-weight: 500;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 420px;
        gap: 40px;
        align-items: center;
        padding: 72px 0;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 600px;
        margin: 16px 0 0;
        font-family: "Lora", Georgia, serif;
        font-size: clamp(38px, 6vw, 62px);
        line-height: 1.05;
        letter-spacing: -0.045em;
      }

      .intro p {
        max-width: 560px;
        margin: 20px 0 0;
        color: var(--text-2);
        font-size: 18px;
        line-height: 1.6;
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--surface);
        padding: 24px;
      }

      .tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 20px;
      }

      .tab {
        min-height: 42px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: transparent;
        color: var(--text-2);
        font: inherit;
        cursor: pointer;
      }

      .tab.active {
        border-color: var(--brand);
        color: var(--text-1);
        background: var(--brand-glow);
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 8px;
        color: var(--text-2);
        font-size: 14px;
        font-weight: 500;
      }

      input {
        width: 100%;
        min-height: 48px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #090b12;
        color: var(--text-1);
        font: inherit;
        padding: 12px;
        outline: none;
      }

      input:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 4px var(--brand-glow);
      }

      .btn {
        min-height: 50px;
        border: 1px solid var(--brand);
        border-radius: 8px;
        background: var(--brand);
        color: var(--text-1);
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      .btn-google {
        width: 100%;
        margin-bottom: 14px;
        border-color: var(--border);
        background: #ffffff;
        color: #111827;
      }

      .link-btn {
        border: 0;
        background: transparent;
        color: var(--text-2);
        font: inherit;
        cursor: pointer;
      }

      .status {
        display: grid;
        gap: 10px;
        margin-top: 16px;
      }

      .message {
        border-left: 3px solid var(--border);
        color: var(--text-2);
        line-height: 1.5;
        margin: 0;
        padding-left: 10px;
      }

      .message.ok {
        border-color: var(--accent);
        color: var(--accent);
      }

      .message.error {
        border-color: var(--danger);
        color: var(--danger);
      }

      @media (max-width: 820px) {
        .layout {
          grid-template-columns: 1fr;
          padding: 40px 0;
        }

        .nav-inner {
          height: 60px;
        }

        h1 {
          font-size: 36px;
        }
      }
    </style>
  </head>
  <body>
    <nav class="nav">
      <div class="container nav-inner">
        <a class="logo" href="/">
          <img class="brand-logo" src="/logo.png" alt="" aria-hidden="true" />
          <span>Dnols</span>
        </a>
        <a class="back-link" href="/">Back to site</a>
      </div>
    </nav>

    <main class="container layout">
      <section class="intro">
        <div class="eyebrow">Business Dashboard</div>
        <h1>Run your business agent from one private dashboard.</h1>
        <p>
          Sign in to manage your agent profile, review incoming deal requests, send orders, approve deals,
          and prepare for API execution when your business is ready.
        </p>
      </section>

      <section class="panel">
        <button class="btn btn-google" id="googleBtn" type="button">Continue with Google</button>
        <div class="tabs" role="tablist">
          <button class="tab active" id="signupTab" type="button">Create account</button>
          <button class="tab" id="signinTab" type="button">Sign in</button>
        </div>

        <form id="authForm">
          <label id="businessLabel">
            Business name
            <input name="businessName" placeholder="Sanelx" />
          </label>
          <label>
            Business email
            <input name="email" type="email" placeholder="owner@business.com" required />
          </label>
          <label>
            Password
            <input name="password" type="password" minlength="6" placeholder="At least 6 characters" required />
          </label>
          <button class="btn" id="submitBtn" type="submit">Create dashboard →</button>
          <button class="link-btn" id="resetBtn" type="button">Reset password</button>
        </form>

        <div id="status" class="status"></div>
      </section>
    </main>

    <script type="module">
      import {
        createOwnerDoc,
        resetPassword,
        signIn,
        signInWithGoogle,
        signOutUser,
        signUp,
        watchUser
      } from "./firebase-client.js";
      import { validateBusinessEmail } from "./js/business-email.js";

      const form = document.querySelector("#authForm");
      const status = document.querySelector("#status");
      const submitBtn = document.querySelector("#submitBtn");
      const resetBtn = document.querySelector("#resetBtn");
      const googleBtn = document.querySelector("#googleBtn");
      const signupTab = document.querySelector("#signupTab");
      const signinTab = document.querySelector("#signinTab");
      const businessLabel = document.querySelector("#businessLabel");
      let mode = "signup";
      let authFlowInProgress = false;

      watchUser((user) => {
        if (user && !authFlowInProgress && !new URLSearchParams(window.location.search).has("stay")) {
          window.location.href = nextUrl();
        }
      });

      signupTab.addEventListener("click", () => setMode("signup"));
      signinTab.addEventListener("click", () => setMode("signin"));

      googleBtn.addEventListener("click", async () => {
        googleBtn.disabled = true;
        googleBtn.textContent = "Opening Google...";
        authFlowInProgress = true;
        try {
          const credentials = await signInWithGoogle();
          const validation = validateBusinessEmail(credentials.user.email);
          if (!validation.valid) {
            await signOutUser();
            showError("Use a Google account with your business email address.");
            return;
          }
          await createOwnerDoc(credentials.user, credentials.user.displayName || credentials.user.email || "Google Business");
          showOk("Google sign-in successful. Redirecting...");
          window.location.href = nextUrl();
        } catch (error) {
          showError(readableAuthError(error));
        } finally {
          authFlowInProgress = false;
          googleBtn.disabled = false;
          googleBtn.textContent = "Continue with Google";
        }
      });

      resetBtn.addEventListener("click", async () => {
        const email = form.elements.email.value.trim();
        const validation = validateBusinessEmail(email);
        if (!validation.valid) {
          showError(validation.message);
          return;
        }
        try {
          await resetPassword(email);
          showOk("Password reset email sent.");
        } catch (error) {
          showError(readableAuthError(error));
        }
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const data = Object.fromEntries(new FormData(form).entries());
        submitBtn.disabled = true;
        submitBtn.textContent = mode === "signup" ? "Creating..." : "Signing in...";
        authFlowInProgress = true;
        try {
          const validation = validateBusinessEmail(data.email);
          if (!validation.valid) {
            showError(validation.message);
            return;
          }
          if (mode === "signup") {
            const credentials = await signUp(data.email, data.password);
            await createOwnerDoc(credentials.user, data.businessName);
            showOk("Dashboard created. Redirecting...");
          } else {
            await signIn(data.email, data.password);
            showOk("Signed in. Redirecting...");
          }
          window.location.href = nextUrl();
        } catch (error) {
          showError(readableAuthError(error));
        } finally {
          authFlowInProgress = false;
          submitBtn.disabled = false;
          submitBtn.textContent = mode === "signup" ? "Create dashboard →" : "Sign in →";
        }
      });

      function setMode(nextMode) {
        mode = nextMode;
        signupTab.classList.toggle("active", mode === "signup");
        signinTab.classList.toggle("active", mode === "signin");
        businessLabel.hidden = mode === "signin";
        submitBtn.textContent = mode === "signup" ? "Create dashboard →" : "Sign in →";
        status.innerHTML = "";
      }

      function nextUrl() {
        return new URLSearchParams(window.location.search).get("next") || "/onboarding.html";
      }

      function showOk(message) {
        status.innerHTML = `<p class="message ok">${escapeHtml(message)}</p>`;
      }

      function showError(message) {
        status.innerHTML = `<p class="message error">${escapeHtml(message)}</p>`;
      }

      function readableAuthError(error) {
        const code = error?.code || "";
        const messages = {
          "auth/configuration-not-found":
            "Firebase Auth is not enabled yet. In Firebase Console, open Authentication > Sign-in method and enable Email/Password.",
          "auth/operation-not-allowed":
            "Email/Password login is not enabled yet. In Firebase Console, open Authentication > Sign-in method and enable Email/Password.",
          "auth/email-already-in-use": "That business email already has a dashboard. Switch to Sign in instead.",
          "auth/invalid-email": "Enter a valid business email address.",
          "auth/weak-password": "Use a stronger password with at least 6 characters.",
          "auth/invalid-credential": "The email or password is incorrect.",
          "auth/popup-closed-by-user": "Google sign-in was closed before it completed.",
          "auth/cancelled-popup-request": "Google sign-in was cancelled. Try again.",
          "auth/user-not-found": "No dashboard exists for that email yet. Create an account first.",
          "auth/wrong-password": "The password is incorrect.",
          "permission-denied":
            "Your account was created, but Firestore blocked dashboard setup. Tell Dnols support to check dashboard security rules."
        };

        if (messages[code]) return messages[code];

        const message = error?.message || "Authentication failed.";
        return `${message.replace("Firebase: ", "").trim()}${code ? ` (${code})` : ""}`;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
    </script>
  </body>
</html>
